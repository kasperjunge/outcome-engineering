name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Ruff lint
        run: uv run ruff check .

      - name: Run type check
        run: uv run ty check

      - name: Run tests
        run: uv run pytest

      - name: Build package
        run: uv build
