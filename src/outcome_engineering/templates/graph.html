<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>product graph</title>
<style>
  :root {
    --bg: #f8f5ee;
    --panel: #fffdf7;
    --panel-2: #fbf0d0;
    --line: #2f2a24;
    --line-soft: #d7cfc2;
    --text: #1f1b16;
    --muted: #776f63;
    --accent: #4c78a8;
    --danger: #d9483b;
    --ok: #2f8f65;
    --vision: #d96c75;
    --strategy: #c6a15b;
    --icp: #9a6bd3;
    --outcome: #4f8cf7;
    --opportunity: #2aa198;
    --solution: #f08c35;
    --assumption-test: #d6aa28;
    --prd: #79808b;
    --shadow: rgba(47, 42, 36, .12);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font: 14px/1.5 "Virgil", "Comic Sans MS", "Bradley Hand", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }
  #app { display: flex; flex-direction: column; height: 100%; }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; border-bottom: 1px solid var(--line);
    background: var(--panel); flex: 0 0 auto;
    flex-wrap: wrap;
    box-shadow: 0 2px 0 rgba(47, 42, 36, .06);
  }
  header .title { font-weight: 600; }
  header .crumbs { color: var(--muted); display: flex; align-items: center; gap: 6px; }
  header .crumbs a { color: var(--accent); cursor: pointer; text-decoration: none; }
  header .crumbs a:hover { text-decoration: underline; }
  header .spacer { flex: 1; }
  button.btn {
    background: #fffaf0; color: var(--text); border: 1.6px solid var(--line);
    border-radius: 4px 7px 5px 8px; padding: 6px 11px; cursor: pointer; font-size: 13px;
    box-shadow: 1px 1px 0 var(--shadow);
  }
  button.btn:hover { border-color: var(--accent); background: #fff3c4; }
  button.btn:disabled { opacity: .4; cursor: default; }
  button.btn.primary { border-color: var(--accent); color: #17324d; background: #dceaff; }
  button.btn.danger { border-color: var(--danger); color: #8e221b; background: #ffe2dc; }
  button.btn.danger:hover { background: #ffd2c9; }
  #main { flex: 1; display: flex; min-height: 0; }
  #canvas-wrap {
    position: relative; flex: 1; min-width: 0;
    background:
      radial-gradient(circle at 1px 1px, rgba(47, 42, 36, .12) 1px, transparent 0) 0 0 / 24px 24px,
      var(--bg);
  }
  svg { width: 100%; height: 100%; display: block; cursor: grab; }
  svg.panning { cursor: grabbing; }
  .legend {
    position: absolute; left: 12px; bottom: 12px; background: rgba(255, 253, 247, .94);
    border: 1.6px solid var(--line); border-radius: 7px 4px 8px 5px; padding: 8px 10px;
    display: flex; flex-direction: column; gap: 5px; font-size: 12px; max-width: 190px;
    box-shadow: 2px 2px 0 var(--shadow);
  }
  .legend .item { display: flex; align-items: center; gap: 7px; cursor: pointer; user-select: none; }
  .legend .item.off { opacity: .35; }
  .legend .swatch { width: 12px; height: 12px; border: 1px solid var(--line); border-radius: 3px 5px 4px 2px; flex: 0 0 auto; }
  .hint {
    position: absolute; right: 12px; bottom: 12px; color: var(--muted);
    font-size: 12px; background: rgba(255, 253, 247, .88); padding: 5px 9px;
    border: 1.4px solid var(--line); border-radius: 5px 8px 4px 7px;
  }
  #toast {
    position: absolute; left: 50%; top: 12px; transform: translateX(-50%);
    max-width: 70%; padding: 8px 14px; border-radius: 9px; font-size: 13px;
    border: 1.6px solid var(--line); background: #fff8db; display: none; z-index: 5;
    box-shadow: 2px 2px 0 var(--shadow);
  }
  #toast.show { display: block; }
  #toast.error { border-color: var(--danger); color: #f3b4b0; }
  #toast.ok { border-color: var(--ok); color: #b6e8cf; }
  /* graph nodes */
  .node { cursor: pointer; }
  .node rect.box { stroke-width: 2.2; fill: #fff9df; filter: url(#sketch); }
  .node:hover rect.box { fill: #fff3bd; }
  .node.selected rect.box { stroke-width: 3; }
  .node .kind { font-size: 9px; letter-spacing: .04em; text-transform: uppercase; fill: var(--muted); }
  .node .label { font-size: 12px; font-weight: 600; fill: var(--text); }
  .node .status { font-size: 9px; fill: var(--muted); }
  .node.dim { opacity: .2; }
  .node .fill { opacity: .14; }
  .node .stripe { opacity: .82; }
  .edge { fill: none; stroke: var(--line); stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }
  .edge.sketch-back { opacity: .24; stroke-width: 3.4; }
  .edge.icp { stroke: var(--icp); stroke-dasharray: 7 6; stroke-width: 1.7; opacity: .8; }
  .edge.icp.sketch-back { stroke-dasharray: none; opacity: .16; }
  .edge.dim { opacity: .08; }
  .toggle { cursor: pointer; }
  .toggle circle { fill: #fffdf7; stroke: var(--line); stroke-width: 1.5; filter: url(#sketch); }
  .toggle text { font-size: 13px; fill: var(--text); text-anchor: middle; dominant-baseline: central; }
  .band-label { fill: var(--muted); font-size: 11px; letter-spacing: .05em; text-transform: uppercase; }
  /* detail panel */
  #detail {
    flex: 0 0 400px; border-left: 1.8px solid var(--line); background: var(--panel);
    overflow-y: auto; padding: 16px 18px;
  }
  #detail.empty { color: var(--muted); }
  #detail .pill {
    display: inline-block; font-size: 10px; letter-spacing: .05em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 999px 700px 900px 650px; border: 1.4px solid var(--line); margin-right: 6px;
    background: #fff8db;
  }
  #detail h1 { font-size: 18px; margin: 12px 0 4px; }
  #detail .id { color: var(--muted); font-size: 12px; font-family: ui-monospace, monospace; }
  #detail .served { margin-top: 10px; }
  #detail .served .chip {
    display: inline-block; font-size: 11px; padding: 2px 8px; margin: 2px 4px 2px 0;
    border-radius: 999px 700px 900px 650px; background: #fff8db; border: 1.4px solid var(--line); cursor: pointer;
  }
  #detail .served .chip:hover { border-color: var(--icp); }
  .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
  .md { margin-top: 14px; border-top: 1px solid var(--line-soft); padding-top: 12px; }
  .md h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 16px 0 6px; }
  .md h3 { font-size: 13px; margin: 12px 0 4px; }
  .md ul { margin: 6px 0; padding-left: 18px; }
  .md li { margin: 3px 0; }
  .md p { margin: 8px 0; }
  .md code { font-family: ui-monospace, monospace; font-size: 12px; background: #fff2bd; padding: 1px 5px; border-radius: 4px; }
  .md pre { background: #fff8db; border: 1px solid var(--line-soft); padding: 10px; border-radius: 7px 4px 8px 5px; overflow-x: auto; font-size: 12px; }
  .md pre code { background: none; padding: 0; }
  /* editor + forms */
  .editor { margin-top: 14px; border-top: 1px solid var(--line-soft); padding-top: 12px; }
  .editor label, .form label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 10px 0 4px; }
  textarea.marker {
    width: 100%; min-height: 320px; resize: vertical; background: #fffdf7; color: var(--text);
    border: 1.6px solid var(--line); border-radius: 7px 5px 8px 4px; padding: 10px;
    font-family: ui-monospace, monospace; font-size: 12.5px; line-height: 1.5;
  }
  .form { margin-top: 14px; border-top: 1px solid var(--line-soft); padding-top: 12px; }
  .form input, .form select {
    width: 100%; background: #fffdf7; color: var(--text); border: 1.6px solid var(--line);
    border-radius: 7px 5px 8px 4px; padding: 7px 9px; font-size: 13px;
  }
  .form .slug-preview { color: var(--muted); font-size: 11px; font-family: ui-monospace, monospace; margin-top: 4px; }
  .issues { margin-top: 12px; border: 1.6px solid var(--danger); border-radius: 7px 5px 8px 4px; padding: 8px 10px; font-size: 12px; color: #8e221b; background: #ffe2dc; }
  .issues .head { color: var(--danger); text-transform: uppercase; letter-spacing: .05em; font-size: 10px; margin-bottom: 4px; }
  @media (max-width: 720px) {
    body { overflow: auto; }
    #app { min-height: 100%; height: auto; }
    header .spacer { display: none; }
    #main { flex-direction: column; min-height: calc(100vh - 92px); }
    #canvas-wrap { flex: 0 0 48vh; min-height: 320px; }
    #detail { flex: 1 1 auto; width: 100%; border-left: 0; border-top: 1.8px solid var(--line); }
    .hint { display: none; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="title" id="root-title">product graph</span>
    <span class="crumbs" id="crumbs"></span>
    <span class="spacer"></span>
    <button class="btn" id="btn-add-outcome">+ Outcome</button>
    <button class="btn" id="btn-add-icp">+ ICP</button>
    <button class="btn" id="btn-vision">Vision</button>
    <button class="btn" id="btn-strategy">Strategy</button>
    <button class="btn" id="btn-overview">Overview</button>
    <button class="btn" id="btn-fit">Fit</button>
  </header>
  <div id="main">
    <div id="canvas-wrap">
      <svg id="svg">
        <defs>
          <filter id="sketch">
            <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="1" seed="8" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.45" />
          </filter>
        </defs>
        <g id="viewport"></g>
      </svg>
      <div class="legend" id="legend"></div>
      <div class="hint">scroll to zoom · drag to pan · click an outcome to focus</div>
      <div id="toast"></div>
    </div>
    <div id="detail" class="empty">Select a node to see its content.</div>
  </div>
</div>
<script>
const KINDS = ["vision", "strategy", "icp", "outcome", "opportunity", "solution", "assumption-test", "prd"];
const KIND_COLOR = {
  "vision": "#d96c75", "strategy": "#c6a15b",
  "icp": "#b07cf0", "outcome": "#4f8cf7", "opportunity": "#2bb3a3",
  "solution": "#f0913a", "assumption-test": "#e6c34a", "prd": "#8a94a6",
};
const NODE_W = 168, NODE_H = 46, ROW_H = 118, COL_W = 196;

let GRAPH = { nodes: [], edges: [], schema: { childKinds: {} } };
let byId = new Map(), childrenOf = new Map(), visions = [], strategies = [], outcomes = [], icps = [];

function buildIndexes() {
  byId = new Map(GRAPH.nodes.map(n => [n.id, n]));
  childrenOf = new Map();
  GRAPH.nodes.forEach(n => childrenOf.set(n.id, []));
  GRAPH.nodes.forEach(n => { if (n.parent && childrenOf.has(n.parent)) childrenOf.get(n.parent).push(n); });
  visions = GRAPH.nodes.filter(n => n.kind === "vision");
  strategies = GRAPH.nodes.filter(n => n.kind === "strategy");
  outcomes = GRAPH.nodes.filter(n => n.kind === "outcome");
  icps = GRAPH.nodes.filter(n => n.kind === "icp");
}
function childKinds(kind) { return (GRAPH.schema && GRAPH.schema.childKinds && GRAPH.schema.childKinds[kind]) || []; }

// Union of ICP ids referenced anywhere in a node's subtree (incl. itself).
function subtreeIcps(node) {
  const seen = new Set();
  (function walk(n) {
    (n.icps || []).forEach(i => seen.add(i));
    (childrenOf.get(n.id) || []).forEach(walk);
  })(node);
  return [...seen];
}
// Nodes inside an outcome subtree that directly reference a given icp.
function referrersOf(outcome, icpId) {
  const out = [];
  (function walk(n) {
    if ((n.icps || []).includes(icpId)) out.push(n);
    (childrenOf.get(n.id) || []).forEach(walk);
  })(outcome);
  return out;
}

const svg = document.getElementById("svg");
const viewport = document.getElementById("viewport");
const SVGNS = "http://www.w3.org/2000/svg";
const state = {
  mode: "overview",   // "overview" | "focus"
  focus: null,        // outcome id when focused
  collapsed: new Set(),
  selected: null,
  hiddenKinds: new Set(),
  view: { x: 0, y: 0, k: 1 },
};

function el(tag, attrs = {}, children = []) {
  const node = document.createElementNS(SVGNS, tag);
  for (const [k, v] of Object.entries(attrs)) node.setAttribute(k, v);
  for (const c of [].concat(children)) node.appendChild(c);
  return node;
}
function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

// ---- node + edge primitives -------------------------------------------------
function drawNode(n, x, y, opts = {}) {
  const color = KIND_COLOR[n.kind] || "#888";
  const g = el("g", { class: "node" + (state.selected === n.id ? " selected" : "") + (state.hiddenKinds.has(n.kind) ? " dim" : ""), transform: `translate(${x},${y})` });
  g.appendChild(el("rect", { class: "fill", x: -NODE_W / 2 + 2, y: -NODE_H / 2 + 2, width: NODE_W - 4, height: NODE_H - 4, rx: 6, fill: color }));
  g.appendChild(el("rect", { class: "box", x: -NODE_W / 2, y: -NODE_H / 2, width: NODE_W, height: NODE_H, rx: 7, stroke: color }));
  g.appendChild(el("path", { class: "stripe", d: `M ${-NODE_W / 2 + 8} ${-NODE_H / 2 + 6} L ${-NODE_W / 2 + 8} ${NODE_H / 2 - 7}`, stroke: color, "stroke-width": 5, "stroke-linecap": "round" }));
  const kindText = el("text", { class: "kind", x: -NODE_W / 2 + 14, y: -NODE_H / 2 + 14 });
  kindText.textContent = n.kind;
  g.appendChild(kindText);
  const label = el("text", { class: "label", x: -NODE_W / 2 + 14, y: 6 });
  label.textContent = truncate(n.title, 22);
  g.appendChild(label);
  if (n.status) {
    const s = el("text", { class: "status", x: -NODE_W / 2 + 14, y: NODE_H / 2 - 7 });
    s.textContent = n.status;
    g.appendChild(s);
  }
  g.addEventListener("click", (e) => { e.stopPropagation(); onNodeClick(n); });
  viewport.appendChild(g);
  // collapse / expand toggle
  if (opts.toggle) {
    const t = el("g", { class: "toggle", transform: `translate(${x},${y + NODE_H / 2 + 12})` });
    t.appendChild(el("circle", { r: 10 }));
    const sign = el("text", {});
    sign.textContent = state.collapsed.has(n.id) ? "+" : "−";
    t.appendChild(sign);
    t.addEventListener("click", (e) => { e.stopPropagation(); toggleCollapse(n.id); });
    viewport.appendChild(t);
  }
  return { x, y };
}

function edgePath(a, b, type) {
  const my = (a.y + b.y) / 2;
  const wobble = sketchOffset(a, b);
  const d = `M ${a.x} ${a.y + NODE_H / 2} C ${a.x + wobble.a} ${my + wobble.b}, ${b.x + wobble.c} ${my - wobble.a}, ${b.x} ${b.y - NODE_H / 2}`;
  const dBack = `M ${a.x + wobble.b} ${a.y + NODE_H / 2 + wobble.a} C ${a.x + wobble.c} ${my - wobble.b}, ${b.x - wobble.b} ${my + wobble.c}, ${b.x + wobble.a} ${b.y - NODE_H / 2 - wobble.b}`;
  const cls = "edge" + (type === "icp" ? " icp" : "");
  return el("g", {}, [
    el("path", { class: cls + " sketch-back", d: dBack }),
    el("path", { class: cls, d }),
  ]);
}
function sketchOffset(a, b) {
  const seed = Math.sin((a.x * 12.9898) + (a.y * 78.233) + (b.x * 37.719) + (b.y * 11.131)) * 43758.5453;
  const f = seed - Math.floor(seed);
  return {
    a: (f - .5) * 16,
    b: ((f * 7) % 1 - .5) * 12,
    c: ((f * 13) % 1 - .5) * 14,
  };
}
function truncate(s, n) { return s.length > n ? s.slice(0, n - 1) + "…" : s; }

// ---- overview (strategic) layout -------------------------------------------
function renderOverview() {
  clear(viewport);
  const usedVisions = visions.slice();
  const usedStrategies = strategies.slice();
  const usedIcps = icps.slice();
  const visionX = spread(usedVisions.length, COL_W * 1.25);
  const strategyX = spread(usedStrategies.length, COL_W * 1.25);
  const icpX = spread(usedIcps.length, COL_W);
  const outX = spread(outcomes.length, COL_W * 1.15);
  const visionY = 0, strategyY = ROW_H * 1.15, icpY = ROW_H * 2.3, outY = ROW_H * 3.7;
  const pos = new Map();
  usedVisions.forEach((vision, i) => pos.set(vision.id, { x: visionX[i], y: visionY }));
  usedStrategies.forEach((strategy, i) => pos.set(strategy.id, { x: strategyX[i], y: strategyY }));
  usedIcps.forEach((icp, i) => pos.set(icp.id, { x: icpX[i], y: icpY }));
  outcomes.forEach((o, i) => pos.set(o.id, { x: outX[i], y: outY }));

  // top-level strategic context edges
  if (!state.hiddenKinds.has("vision")) {
    usedVisions.forEach(vision => {
      const targets = usedStrategies.length && !state.hiddenKinds.has("strategy") ? usedStrategies : outcomes;
      targets.forEach(target => {
        if (pos.has(target.id) && !state.hiddenKinds.has(target.kind)) viewport.appendChild(edgePath(pos.get(vision.id), pos.get(target.id), "structural"));
      });
    });
  }
  if (!state.hiddenKinds.has("strategy")) {
    usedStrategies.forEach(strategy => {
      outcomes.forEach(o => {
        if (!state.hiddenKinds.has("outcome")) viewport.appendChild(edgePath(pos.get(strategy.id), pos.get(o.id), "structural"));
      });
    });
  }
  // edges: outcome serves icp (aggregated over its subtree)
  outcomes.forEach(o => {
    if (state.hiddenKinds.has("outcome")) return;
    subtreeIcps(o).forEach(icpId => {
      if (!pos.has(icpId) || state.hiddenKinds.has("icp")) return;
      viewport.appendChild(edgePath(pos.get(o.id), pos.get(icpId), "icp"));
    });
  });
  if (usedVisions.length) addBandLabel("vision", visionX, visionY);
  if (usedStrategies.length) addBandLabel("strategy", strategyX, strategyY);
  if (usedIcps.length) addBandLabel("ideal customer profiles", icpX, icpY);
  if (outcomes.length) addBandLabel("outcomes", outX, outY);
  usedVisions.forEach(vision => drawNode(vision, pos.get(vision.id).x, pos.get(vision.id).y));
  usedStrategies.forEach(strategy => drawNode(strategy, pos.get(strategy.id).x, pos.get(strategy.id).y));
  usedIcps.forEach(icp => drawNode(icp, pos.get(icp.id).x, pos.get(icp.id).y));
  outcomes.forEach(o => drawNode(o, pos.get(o.id).x, pos.get(o.id).y));
}

function addBandLabel(text, xs, y) {
  if (!xs.length) return;
  const t = el("text", { class: "band-label", x: Math.min(...xs) - NODE_W / 2, y: y - NODE_H / 2 - 14 });
  t.textContent = text;
  viewport.appendChild(t);
}
function spread(count, gap) {
  const xs = [];
  const start = -((count - 1) * gap) / 2;
  for (let i = 0; i < count; i++) xs.push(start + i * gap);
  return xs;
}

// ---- focus (tactical) layout: one outcome subtree --------------------------
function renderFocus(outcomeId) {
  clear(viewport);
  const root = byId.get(outcomeId);
  if (!root) { goOverview(); return; }
  let cursor = 0;
  const pos = new Map();
  (function layout(n, depth) {
    const kids = state.collapsed.has(n.id) ? [] : (childrenOf.get(n.id) || []).filter(c => !state.hiddenKinds.has(c.kind));
    const y = depth * ROW_H;
    if (kids.length === 0) {
      pos.set(n.id, { x: cursor * COL_W, y });
      cursor++;
    } else {
      kids.forEach(c => layout(c, depth + 1));
      const xs = kids.map(c => pos.get(c.id).x);
      pos.set(n.id, { x: (Math.min(...xs) + Math.max(...xs)) / 2, y });
    }
  })(root, 1);

  // pinned ICPs this subtree serves, sitting above the outcome
  const served = subtreeIcps(root).map(id => byId.get(id)).filter(Boolean);
  const icpXs = spread(served.length, COL_W);
  const rootX = pos.get(root.id).x;
  served.forEach((icp, i) => pos.set(icp.id, { x: rootX + icpXs[i], y: -ROW_H * 0.55 }));

  // structural edges
  (function edges(n) {
    if (state.collapsed.has(n.id)) return;
    (childrenOf.get(n.id) || []).filter(c => !state.hiddenKinds.has(c.kind)).forEach(c => {
      viewport.appendChild(edgePath(pos.get(n.id), pos.get(c.id), "structural"));
      edges(c);
    });
  })(root);
  // icp reference edges to the specific referrers
  if (!state.hiddenKinds.has("icp")) {
    served.forEach(icp => {
      referrersOf(root, icp.id).forEach(ref => {
        if (pos.has(ref.id)) viewport.appendChild(edgePath(pos.get(icp.id), pos.get(ref.id), "icp"));
      });
    });
  }
  served.forEach(icp => drawNode(icp, pos.get(icp.id).x, pos.get(icp.id).y));
  (function nodes(n) {
    const p = pos.get(n.id);
    const kids = (childrenOf.get(n.id) || []).filter(c => !state.hiddenKinds.has(c.kind));
    drawNode(n, p.x, p.y, { toggle: kids.length > 0 });
    if (!state.collapsed.has(n.id)) kids.forEach(nodes);
  })(root);
}

// ---- interaction ------------------------------------------------------------
function onNodeClick(n) {
  state.selected = n.id;
  showDetail(n);
  if (n.kind === "outcome" && state.mode === "overview") enterFocus(n.id);
  else render();
}
function enterFocus(outcomeId) { state.mode = "focus"; state.focus = outcomeId; state.collapsed.clear(); render({ fitView: true }); }
function goOverview() { state.mode = "overview"; state.focus = null; state.selected = null; render({ fitView: true }); clearDetail(); }
function toggleCollapse(id) { state.collapsed.has(id) ? state.collapsed.delete(id) : state.collapsed.add(id); render({ fitView: true }); }

function render({ fitView = false } = {}) {
  if (state.mode === "focus" && state.focus) renderFocus(state.focus);
  else renderOverview();
  renderCrumbs();
  renderLegend();
  document.getElementById("btn-overview").disabled = state.mode === "overview";
  if (fitView) fit();
  else applyView();
}
function renderCrumbs() {
  const c = document.getElementById("crumbs");
  clearHtml(c);
  if (state.mode === "overview") { c.textContent = "· overview"; return; }
  const o = byId.get(state.focus);
  const link = document.createElement("a");
  link.textContent = "overview";
  link.onclick = goOverview;
  c.appendChild(document.createTextNode("· "));
  c.appendChild(link);
  c.appendChild(document.createTextNode(" / " + (o ? o.title : state.focus)));
}
function renderLegend() {
  const present = new Set(GRAPH.nodes.map(n => n.kind));
  const wrap = document.getElementById("legend");
  clearHtml(wrap);
  KINDS.filter(k => present.has(k)).forEach(k => {
    const item = document.createElement("div");
    item.className = "item" + (state.hiddenKinds.has(k) ? " off" : "");
    const sw = document.createElement("span");
    sw.className = "swatch"; sw.style.background = KIND_COLOR[k];
    const lab = document.createElement("span"); lab.textContent = k;
    item.appendChild(sw); item.appendChild(lab);
    item.onclick = () => { state.hiddenKinds.has(k) ? state.hiddenKinds.delete(k) : state.hiddenKinds.add(k); render({ fitView: true }); };
    wrap.appendChild(item);
  });
}

// ---- detail panel -----------------------------------------------------------
function clearHtml(node) { while (node.firstChild) node.removeChild(node.firstChild); }
function clearDetail() {
  const d = document.getElementById("detail");
  d.className = "empty"; d.textContent = "Select a node to see its content.";
}
function showDoc(title, body) {
  const d = document.getElementById("detail");
  d.className = ""; clearHtml(d);
  const h = document.createElement("h1"); h.textContent = title; d.appendChild(h);
  const md = document.createElement("div"); md.className = "md"; md.innerHTML = renderMarkdown(body);
  d.appendChild(md);
}
function showDetail(n) {
  const d = document.getElementById("detail");
  d.className = ""; clearHtml(d);
  const pill = document.createElement("span");
  pill.className = "pill"; pill.style.color = KIND_COLOR[n.kind]; pill.style.borderColor = KIND_COLOR[n.kind];
  pill.textContent = n.kind; d.appendChild(pill);
  if (n.status) { const s = document.createElement("span"); s.className = "pill"; s.textContent = n.status; d.appendChild(s); }
  const h = document.createElement("h1"); h.textContent = n.title; d.appendChild(h);
  const id = document.createElement("div"); id.className = "id"; id.textContent = n.id; d.appendChild(id);

  const served = n.kind === "icp" ? (n.servedBy || []) : (n.icps || []);
  if (served.length) {
    const wrap = document.createElement("div"); wrap.className = "served";
    const lbl = document.createElement("div"); lbl.style.color = "var(--muted)"; lbl.style.fontSize = "12px";
    lbl.textContent = n.kind === "icp" ? "Serves" : "ICPs served";
    wrap.appendChild(lbl);
    served.forEach(rid => {
      const chip = document.createElement("span"); chip.className = "chip";
      const target = byId.get(rid); chip.textContent = target ? target.title : rid;
      chip.onclick = () => { const t = byId.get(rid); if (t) onNodeClick(t); };
      wrap.appendChild(chip);
    });
    d.appendChild(wrap);
  }

  // action buttons: edit, add child (legal kinds only), delete
  const actions = document.createElement("div"); actions.className = "actions";
  const editBtn = document.createElement("button"); editBtn.className = "btn primary"; editBtn.textContent = "Edit";
  editBtn.onclick = () => showEditor(n);
  actions.appendChild(editBtn);
  childKinds(n.kind).forEach(ck => {
    const b = document.createElement("button"); b.className = "btn"; b.textContent = "+ " + ck;
    b.onclick = () => showCreateForm(ck, n.id);
    actions.appendChild(b);
  });
  if (n.deletable !== false) {
    const delBtn = document.createElement("button"); delBtn.className = "btn danger"; delBtn.textContent = "Delete";
    delBtn.onclick = () => deleteNode(n);
    actions.appendChild(delBtn);
  }
  d.appendChild(actions);

  const md = document.createElement("div"); md.className = "md"; md.innerHTML = renderMarkdown(stripFrontHeading(n.body));
  d.appendChild(md);
}

// ---- editing / creating / deleting -----------------------------------------
function showEditor(n) {
  const d = document.getElementById("detail");
  d.className = ""; clearHtml(d);
  const h = document.createElement("h1"); h.textContent = "Edit " + n.title; d.appendChild(h);
  const sub = document.createElement("div"); sub.className = "id"; sub.textContent = n.marker || n.id; d.appendChild(sub);

  const ed = document.createElement("div"); ed.className = "editor";
  const lbl = document.createElement("label"); lbl.textContent = "Marker file"; ed.appendChild(lbl);
  const ta = document.createElement("textarea"); ta.className = "marker"; ta.value = n.body + "\n"; ed.appendChild(ta);
  const actions = document.createElement("div"); actions.className = "actions";
  const save = document.createElement("button"); save.className = "btn primary"; save.textContent = "Save";
  save.onclick = async () => {
    save.disabled = true;
    clearIssues();
    const res = await api("PUT", "/api/nodes/" + encodeURIComponent(n.id), { content: ta.value });
    if (res.ok) {
      toast("Saved", "ok");
      await reload(n.id);
      if (res.data.issues && res.data.issues.length) {
        save.disabled = false;
        reportIssues(res.data.issues);
      } else {
        const updated = byId.get(res.data.id) || byId.get(n.id);
        if (updated) showDetail(updated);
      }
    }
    else { save.disabled = false; toast(res.error || "Save failed", "error"); }
  };
  const cancel = document.createElement("button"); cancel.className = "btn"; cancel.textContent = "Cancel";
  cancel.onclick = () => { const t = byId.get(n.id); if (t) showDetail(t); else clearDetail(); };
  actions.appendChild(save); actions.appendChild(cancel);
  ed.appendChild(actions);
  d.appendChild(ed);
  ta.focus();
}

function showCreateForm(kind, under) {
  const d = document.getElementById("detail");
  d.className = ""; clearHtml(d);
  const h = document.createElement("h1"); h.textContent = "New " + kind; d.appendChild(h);
  if (under) { const sub = document.createElement("div"); sub.className = "id"; sub.textContent = "under " + under; d.appendChild(sub); }

  const form = document.createElement("div"); form.className = "form";
  const tlbl = document.createElement("label"); tlbl.textContent = "Title"; form.appendChild(tlbl);
  const title = document.createElement("input"); title.placeholder = kind + " title"; form.appendChild(title);
  const slugPreview = document.createElement("div"); slugPreview.className = "slug-preview"; form.appendChild(slugPreview);
  title.oninput = () => { slugPreview.textContent = title.value ? "slug: " + slugify(title.value) : ""; };

  const actions = document.createElement("div"); actions.className = "actions";
  const create = document.createElement("button"); create.className = "btn primary"; create.textContent = "Create";
  create.onclick = async () => {
    const slug = slugify(title.value);
    if (!slug) { toast("Enter a title", "error"); return; }
    create.disabled = true;
    const res = await api("POST", "/api/nodes", { kind, slug, title: title.value, under: under || null });
    if (res.ok) {
      toast("Created " + res.data.id, "ok");
      const newId = res.data.id;
      const parent = under ? byId.get(under) : null;
      await reload(newId);
      // focus the relevant outcome subtree so the new node is visible
      const created = byId.get(newId);
      if (created && created.kind !== "outcome" && created.kind !== "icp") {
        const oc = outcomeAncestor(created);
        if (oc) enterFocus(oc.id);
      }
      if (created) { state.selected = created.id; showDetail(created); }
      reportIssues(res.data.issues);
    } else { create.disabled = false; toast(res.error || "Create failed", "error"); }
  };
  const cancel = document.createElement("button"); cancel.className = "btn"; cancel.textContent = "Cancel";
  cancel.onclick = () => { const t = under ? byId.get(under) : null; if (t) showDetail(t); else clearDetail(); };
  actions.appendChild(create); actions.appendChild(cancel);
  form.appendChild(actions);
  d.appendChild(form);
  title.focus();
}

async function deleteNode(n) {
  const kids = childrenOf.get(n.id) || [];
  let cascade = false;
  if (kids.length) {
    if (!confirm(`${n.title} has ${kids.length} child node(s). Delete it and its entire subtree?`)) return;
    cascade = true;
  } else if (!confirm(`Delete ${n.title}?`)) {
    return;
  }
  const path = "/api/nodes/" + encodeURIComponent(n.id) + (cascade ? "?cascade=true" : "");
  const res = await api("DELETE", path);
  if (res.ok) {
    toast("Deleted " + n.id, "ok");
    if (state.focus === n.id) { state.mode = "overview"; state.focus = null; }
    state.selected = null;
    await reload();
    clearDetail();
    reportIssues(res.data.issues);
  } else { toast(res.error || "Delete failed", "error"); }
}

function outcomeAncestor(node) {
  let cur = node;
  while (cur) {
    if (cur.kind === "outcome") return cur;
    cur = cur.parent ? byId.get(cur.parent) : null;
  }
  return null;
}
function slugify(t) { return t.toLowerCase().trim().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, ""); }

async function api(method, path, body) {
  try {
    const opts = { method, headers: { "Content-Type": "application/json" } };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const res = await fetch(path, opts);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) return { ok: false, error: data.error, data };
    return { ok: true, data };
  } catch (e) {
    return { ok: false, error: String(e) };
  }
}

let toastTimer = null;
function toast(msg, kind) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "show" + (kind ? " " + kind : "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ""; }, 3200);
}
function reportIssues(issues) {
  if (!issues || !issues.length) return;
  clearIssues();
  const d = document.getElementById("detail");
  const box = document.createElement("div"); box.className = "issues";
  const head = document.createElement("div"); head.className = "head"; head.textContent = "Validation issues"; box.appendChild(head);
  issues.forEach(i => { const p = document.createElement("div"); p.textContent = i.message; box.appendChild(p); });
  d.appendChild(box);
}
function clearIssues() {
  document.querySelectorAll("#detail .issues").forEach(node => node.remove());
}

// drop the document metadata and leading "# Title" from the node body
function stripFrontHeading(body) {
  return body.replace(/^---\n[\s\S]*?\n---\n?/, "").replace(/^#\s+.*\n/, "").trim();
}

// minimal, safe markdown -> html (escapes first, then formats a known subset)
function renderMarkdown(src) {
  const esc = s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const lines = src.split("\n");
  let html = "", inUl = false, inCode = false, code = "";
  const closeUl = () => { if (inUl) { html += "</ul>"; inUl = false; } };
  for (const raw of lines) {
    const line = raw;
    if (line.trim().startsWith("```")) {
      if (inCode) { html += "<pre><code>" + esc(code) + "</code></pre>"; code = ""; inCode = false; }
      else { closeUl(); inCode = true; }
      continue;
    }
    if (inCode) { code += line + "\n"; continue; }
    if (/^###\s+/.test(line)) { closeUl(); html += "<h3>" + inline(esc(line.replace(/^###\s+/, ""))) + "</h3>"; continue; }
    if (/^##\s+/.test(line)) { closeUl(); html += "<h2>" + inline(esc(line.replace(/^##\s+/, ""))) + "</h2>"; continue; }
    if (/^#\s+/.test(line)) { closeUl(); html += "<h3>" + inline(esc(line.replace(/^#\s+/, ""))) + "</h3>"; continue; }
    if (/^\s*[-*]\s+/.test(line)) { if (!inUl) { html += "<ul>"; inUl = true; } html += "<li>" + inline(esc(line.replace(/^\s*[-*]\s+/, ""))) + "</li>"; continue; }
    if (line.trim() === "") { closeUl(); continue; }
    closeUl(); html += "<p>" + inline(esc(line)) + "</p>";
  }
  if (inCode) html += "<pre><code>" + esc(code) + "</code></pre>";
  closeUl();
  return html;
}
function inline(s) {
  return s.replace(/`([^`]+)`/g, "<code>$1</code>")
          .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
}

// ---- pan / zoom -------------------------------------------------------------
function applyView() { viewport.setAttribute("transform", `translate(${state.view.x},${state.view.y}) scale(${state.view.k})`); }
function fit() {
  const bb = viewport.getBBox();
  if (!bb.width || !bb.height) { state.view = { x: 0, y: 0, k: 1 }; applyView(); return; }
  const rect = svg.getBoundingClientRect();
  const pad = 60;
  const k = Math.min((rect.width - pad) / bb.width, (rect.height - pad) / bb.height, 1.3);
  state.view.k = k;
  state.view.x = rect.width / 2 - (bb.x + bb.width / 2) * k;
  state.view.y = rect.height / 2 - (bb.y + bb.height / 2) * k;
  applyView();
}
svg.addEventListener("wheel", (e) => {
  e.preventDefault();
  const rect = svg.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const factor = Math.exp(-e.deltaY * 0.0012);
  const nk = Math.min(Math.max(state.view.k * factor, 0.15), 3);
  const r = nk / state.view.k;
  state.view.x = mx - (mx - state.view.x) * r;
  state.view.y = my - (my - state.view.y) * r;
  state.view.k = nk;
  applyView();
}, { passive: false });
let dragging = false, last = null;
svg.addEventListener("mousedown", (e) => { dragging = true; last = { x: e.clientX, y: e.clientY }; svg.classList.add("panning"); });
window.addEventListener("mousemove", (e) => {
  if (!dragging) return;
  state.view.x += e.clientX - last.x; state.view.y += e.clientY - last.y;
  last = { x: e.clientX, y: e.clientY }; applyView();
});
window.addEventListener("mouseup", () => { dragging = false; svg.classList.remove("panning"); });
svg.addEventListener("click", () => { state.selected = null; render(); });

// ---- buttons ----------------------------------------------------------------
document.getElementById("btn-overview").onclick = goOverview;
document.getElementById("btn-fit").onclick = fit;
document.getElementById("btn-add-outcome").onclick = () => showCreateForm("outcome", null);
document.getElementById("btn-add-icp").onclick = () => showCreateForm("icp", null);
document.getElementById("btn-vision").onclick = () => selectFirstNode("vision", "Vision", GRAPH.vision);
document.getElementById("btn-strategy").onclick = () => selectFirstNode("strategy", "Strategy", GRAPH.strategy);
window.addEventListener("resize", () => applyView());

// ---- data loading -----------------------------------------------------------
function selectFirstNode(kind, title, fallbackBody) {
  const node = GRAPH.nodes.find(n => n.kind === kind);
  if (node) {
    state.mode = "overview";
    state.focus = null;
    state.selected = node.id;
    render({ fitView: true });
    showDetail(node);
  } else {
    state.selected = null;
    render({ fitView: true });
    showDoc(title, stripFrontHeading(fallbackBody || "_No content recorded._"));
  }
}
async function reload(selectId) {
  const res = await api("GET", "/api/graph");
  if (!res.ok) { toast("Failed to load graph", "error"); return; }
  GRAPH = res.data;
  buildIndexes();
  document.getElementById("root-title").textContent = GRAPH.root || "product graph";
  document.title = (GRAPH.root || "product") + " · product graph";
  // drop stale selection / focus
  if (state.focus && !byId.has(state.focus)) { state.mode = "overview"; state.focus = null; }
  if (state.selected && !byId.has(state.selected)) state.selected = null;
  if (selectId && byId.has(selectId)) { state.selected = selectId; }
  render({ fitView: true });
}

reload();
</script>
